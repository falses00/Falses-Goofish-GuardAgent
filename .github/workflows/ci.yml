name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Unit tests
        run: pytest tests/test_agents.py tests/test_message_aggregation.py tests/test_product_rules.py tests/test_api.py -q
      - name: Compile check
        run: python -m py_compile main.py XianyuAgent.py context_manager.py core/experts.py core/message_aggregation.py core/model_provider.py core/observability.py core/product_rules.py core/evaluation.py core/trace_store.py api/app.py tests/test_agents.py tests/test_message_aggregation.py tests/test_product_rules.py tests/test_api.py
      - name: Runtime smoke
        run: python main.py --mode smoke
      - name: Agent eval gate
        run: python tools/run_agent_eval.py --min-score 1.0
