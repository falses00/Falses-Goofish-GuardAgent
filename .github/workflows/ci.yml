name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Unit tests
        run: python -m pytest -q
      - name: Compile check
        run: python -m compileall -q main.py XianyuAgent.py XianyuApis.py context_manager.py core api tests tools
      - name: Runtime readiness
        env:
          AGNES_API_KEY: ci-test-key
          COOKIES_STR: unb=ci_seller
        run: python main.py --mode doctor
      - name: Runtime smoke
        run: python main.py --mode smoke
      - name: Live execution replay
        run: python main.py --mode replay
      - name: Agent eval gate
        run: python tools/run_agent_eval.py --min-score 1.0
      - name: Build project image
        run: docker build -t falses-goofish-guardagent:ci .
